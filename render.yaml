services:
  - type: web
    name: slack-log-viewer
    runtime: node
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install && npm run build
    startCommand: node backend/dist/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
