services:
  - type: web
    name: slack-log-viewer
    runtime: node
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install && npm run build
    startCommand: node backend/dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: slack-log-db
          property: connectionString
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: NODE_ENV
        value: production

  - type: cron
    name: slack-log-sync
    runtime: node
    schedule: "0 * * * *"
    buildCommand: echo "skip"
    startCommand: node backend/scripts/sync.mjs
    envVars:
      - key: BACKEND_URL
        value: https://slack-log-viewer.onrender.com

databases:
  - name: slack-log-db
    databaseName: slack_logs
    user: postgres
